{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Title</title>
    <link rel="stylesheet" href="{% static 'gallery/styles.css' %}"/>
</head>
<body>
    <div class="main">
        <div class="header">
            <input type="file" id="file-input" multiple style="display: none">
            <button id="upload-btn">Загрузить</button>
        </div>
        <div class="body">
            <div class="menu">

            </div>
            <div class="gallery">
                {% for photo in photos %}
                    <div class="row">
                        <img src="{{ photo.image.url }}" alt="{{ photo.image.descripton }}">
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
<script src="{% static 'gallery/index.js' %}"></script>
</html>
